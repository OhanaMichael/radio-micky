# Redirects: HTTP -> HTTPS + www canonical
[[redirects]]
  from = "http://radio-micky.co.il/*"
  to = "https://www.radio-micky.co.il/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.radio-micky.co.il/*"
  to = "https://www.radio-micky.co.il/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://radio-micky.co.il/*"
  to = "https://www.radio-micky.co.il/:splat"
  status = 301
  force = true

# Cache headers for static assets
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
